<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Bullet Hell - Co-op</title>
    <!-- Include PeerJS for WebRTC Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* รีเซ็ตค่าเริ่มต้น */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050510;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 600px;
            height: 800px;
            box-shadow: 0 0 40px rgba(102, 252, 241, 0.3);
            border: 2px solid #1f2833;
            border-radius: 8px;
            overflow: hidden;
            background-color: #0b0c10;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* เลเยอร์ UI ตอนเล่นเกม */
        #uiLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            padding: 20px;
            display: none; /* ซ่อนตอนอยู่หน้าเมนู */
        }

        #scoreDisplay {
            font-size: 24px; font-weight: bold; color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1; margin-bottom: 10px;
        }

        .player-status { display: flex; gap: 20px; align-items: flex-start; }

        .hp-box { display: flex; flex-direction: column; gap: 5px; }

        .hpBarContainer {
            width: 150px; height: 15px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid #c5c6c7; border-radius: 8px; overflow: hidden;
        }

        .hpBar {
            width: 100%; height: 100%;
            background-color: #45a29e;
            box-shadow: 0 0 10px #45a29e;
            transition: width 0.2s ease, background-color 0.2s ease;
        }

        .weaponLevelDisplay {
            font-size: 14px; color: #ffeb3b; text-shadow: 0 0 8px #ffeb3b;
        }

        /* หน้าจอ Main Menu */
        #mainMenu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20;
        }

        #mainMenu h1 {
            font-size: 52px; color: #66fcf1; text-shadow: 0 0 20px #66fcf1;
            margin-bottom: 5px; text-align: center;
        }
        #mainMenu h2 { font-size: 20px; color: #c5c6c7; margin-bottom: 30px; letter-spacing: 2px; }

        .ship-selection { display: flex; gap: 20px; margin-bottom: 20px; }
        .ship-card {
            border: 2px solid #333; border-radius: 12px; padding: 20px 15px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            background: rgba(255,255,255,0.05); width: 160px;
        }
        .ship-card:hover { background: rgba(255,255,255,0.1); }
        .ship-card.selected { border-color: #66fcf1; box-shadow: 0 0 20px rgba(102, 252, 241, 0.5); background: rgba(102, 252, 241, 0.1); }
        .ship-card canvas { margin-bottom: 10px; }
        .ship-card h3 { margin-bottom: 10px; font-size: 18px; }
        .ship-card p { font-size: 14px; color: #aaa; line-height: 1.5; }

        /* ปุ่มต่างๆ */
        .btn {
            padding: 10px 20px; font-size: 18px; font-weight: bold; font-family: inherit;
            background: transparent; border: 2px solid #66fcf1; color: #66fcf1;
            border-radius: 5px; cursor: pointer; text-shadow: 0 0 5px #66fcf1;
            transition: all 0.3s ease; text-transform: uppercase; margin: 5px;
        }
        .btn:hover { background: #66fcf1; color: #050510; box-shadow: 0 0 20px #66fcf1; transform: scale(1.05); }

        #mp-controls {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            margin-top: 20px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px;
            width: 80%;
        }

        .mp-row { display: flex; gap: 10px; align-items: center; }
        
        input[type="text"] {
            padding: 10px; font-family: inherit; font-size: 16px;
            background: #111; color: #66fcf1; border: 1px solid #66fcf1; border-radius: 5px;
            text-align: center; width: 250px;
        }

        #statusText { margin-top: 10px; color: #ffeb3b; }

        /* หน้าจอ Game Over */
        #gameOverScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }
        #gameOverScreen h1 { font-size: 64px; color: #ff003c; text-shadow: 0 0 20px #ff003c; margin-bottom: 10px; }
        #gameOverScreen p { font-size: 24px; color: #fff; margin-bottom: 40px; }
        
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="600" height="800"></canvas>
    
    <div id="uiLayer">
        <div id="scoreDisplay">SCORE: <span id="scoreValue">0</span></div>
        <div class="player-status">
            <div class="hp-box">
                <span style="font-size: 12px; color: #aaa;">PLAYER 1 (YOU)</span>
                <div class="hpBarContainer"><div id="hpBar1" class="hpBar"></div></div>
                <div class="weaponLevelDisplay">WEAPON LV: <span id="weaponLvValue1">1</span></div>
            </div>
            <div class="hp-box" id="p2UiBox" style="display:none;">
                <span style="font-size: 12px; color: #aaa;">PLAYER 2 (ALLY)</span>
                <div class="hpBarContainer"><div id="hpBar2" class="hpBar"></div></div>
                <div class="weaponLevelDisplay">WEAPON LV: <span id="weaponLvValue2">1</span></div>
            </div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu">
        <h1>NEON BULLET HELL</h1>
        <h2>CO-OP MULTIPLAYER</h2>
        <div class="ship-selection">
            <div class="ship-card selected" data-ship="1">
                <canvas id="ship1Preview" width="80" height="80"></canvas>
                <h3 style="color:#66fcf1">STRIKER</h3>
                <p>Speed: ★★★<br>Armor: ★★★</p>
            </div>
            <div class="ship-card" data-ship="2">
                <canvas id="ship2Preview" width="80" height="80"></canvas>
                <h3 style="color:#ffeb3b">PHANTOM</h3>
                <p>Speed: ★★★★★<br>Armor: ★☆☆</p>
            </div>
            <div class="ship-card" data-ship="3">
                <canvas id="ship3Preview" width="80" height="80"></canvas>
                <h3 style="color:#39ff14">TITAN</h3>
                <p>Speed: ★☆☆<br>Armor: ★★★★★</p>
            </div>
        </div>
        
        <div id="mp-controls">
            <button id="singlePlayerBtn" class="btn">SINGLE PLAYER</button>
            <hr style="width: 100%; border-color: #333; margin: 10px 0;">
            <div class="mp-row">
                <button id="hostBtn" class="btn" style="border-color:#39ff14; color:#39ff14;">HOST GAME</button>
            </div>
            <div class="mp-row">
                <input type="text" id="joinIdInput" placeholder="Enter Host ID to Join">
                <button id="joinBtn" class="btn" style="border-color:#ffeb3b; color:#ffeb3b;">JOIN</button>
            </div>
            <p id="statusText"></p>
        </div>
    </div>
    
    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>FINAL SCORE: <span id="finalScore">0</span></p>
        <button id="restartBtn" class="btn">MAIN MENU</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const uiLayer = document.getElementById('uiLayer');
    const mainMenu = document.getElementById('mainMenu');
    
    const statusText = document.getElementById('statusText');
    const joinIdInput = document.getElementById('joinIdInput');

    let isHost = true;
    let isMultiplayer = false;
    let peer = null;
    let connection = null;

    let gameActive = false;
    let score = 0;
    let frameCount = 0;
    let selectedShipType = 1;

    let players = {}; // { p1: Player, p2: Player }
    let myPlayerId = 'p1'; // p1 for host/single, p2 for client
    let otherPlayerId = 'p2';

    let allBullets = []; // Shared list for bullets (differentiator on owner or color)
    let enemyBullets = [];
    let enemies = [];
    let items = [];
    let particles = [];
    let stars = [];
    let animationId;
    let enemyIdCounter = 0;
    let itemIdCounter = 0;

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // --- PeerJS Networking ---
    function initPeer() {
        if (peer) peer.destroy();
        peer = new Peer();
        return peer;
    }

    document.getElementById('singlePlayerBtn').addEventListener('click', () => {
        isMultiplayer = false;
        startGameAsHost();
    });

    document.getElementById('hostBtn').addEventListener('click', () => {
        statusText.innerText = "Initializing Host...";
        initPeer().on('open', id => {
            statusText.innerHTML = `Waiting for player... <br><br><b>Your Host ID:</b> ${id}<br><span style="font-size:12px">(Share this ID with a friend)</span>`;
            isHost = true;
            isMultiplayer = true;
        });
        peer.on('connection', conn => {
            connection = conn;
            setupConnection();
        });
    });

    document.getElementById('joinBtn').addEventListener('click', () => {
        const joinId = joinIdInput.value.trim();
        if (!joinId) { statusText.innerText = "Please enter a valid Host ID."; return; }
        
        statusText.innerText = "Connecting to Host...";
        initPeer().on('open', id => {
            connection = peer.connect(joinId);
            setupConnection();
            isHost = false;
            isMultiplayer = true;
        });
    });

    function setupConnection() {
        connection.on('open', () => {
            statusText.innerText = "Connected! Starting game...";
            
            // Client sends their selected ship
            if (!isHost) {
                connection.send({ type: 'init', shipType: selectedShipType });
            }

            connection.on('data', data => {
                handleNetworkData(data);
            });
        });

        connection.on('close', () => {
            alert("Connection lost.");
            location.reload();
        });
        connection.on('error', err => {
            console.error(err);
            alert("Network error.");
            location.reload();
        });
    }

    function handleNetworkData(data) {
        if (!gameActive && data.type !== 'start' && data.type !== 'init') return;

        if (isHost && data.type === 'init') {
            // Client joined
            startGameAsHost(data.shipType);
        } else if (!isHost && data.type === 'start') {
            // Host started game
            startGameAsClient(data.clientShipType, data.hostShipType);
        } else if (data.type === 'sync') {
            // Continuous Sync
            if (isHost) {
                // Host receives client state & inputs
                if (players['p2']) {
                    players['p2'].x = data.px;
                    players['p2'].y = data.py;
                    if (data.shoot) {
                        players['p2'].shoot();
                    }
                }
            } else {
                // Client receives full world state
                score = data.score;
                if (players['p1']) {
                    players['p1'].x = data.p1.x; players['p1'].y = data.p1.y;
                    players['p1'].hp = data.p1.hp; players['p1'].maxHp = data.p1.maxHp;
                    players['p1'].weaponLevel = data.p1.wl;
                }
                if (players['p2']) {
                    players['p2'].hp = data.p2.hp; players['p2'].maxHp = data.p2.maxHp;
                    players['p2'].weaponLevel = data.p2.wl;
                }
                
                // Sync Enemies
                let newEnemies = [];
                data.enemies.forEach(ed => {
                    let e = new Enemy(ed.x, ed.y, ed.t);
                    e.hp = ed.hp; e.maxHp = ed.mhp; e.id = ed.id;
                    newEnemies.push(e);
                });
                enemies = newEnemies;

                // Sync Items
                let newItems = [];
                data.items.forEach(itData => {
                    newItems.push(new Item(itData.x, itData.y, itData.t, itData.id));
                });
                items = newItems;

                // Sync Enemy Bullets
                let newEBullets = [];
                data.eBullets.forEach(b => {
                    newEBullets.push(new Bullet(b.x, b.y, b.vx, b.vy, b.c, true));
                });
                enemyBullets = newEBullets;

                // Client still controls its own bullets locally, and receives P1 bullets via syncing event?
                // For simplicity, Host sends all P1 bullets, Client sends P2 bullets.
                // Wait, if we send bullets every frame, it might be heavy. Let's send Host pos instead.
                
                // Host bullets
                let hostBulls = [];
                data.hostBullets.forEach(b => {
                    hostBulls.push(new Bullet(b.x, b.y, b.vx, b.vy, b.c, false));
                });
                
                // My bullets (P2)
                let myBulls = allBullets.filter(b => b.owner === myPlayerId);
                allBullets = hostBulls.concat(myBulls);
                
                // Sync Particles (Hits/Explosions)
                data.events.forEach(ev => {
                    if (ev.type === 'explosion') createExplosion(ev.x, ev.y, ev.c, ev.amount);
                    if (ev.type === 'gameover') showGameOver();
                });
            }
        }
    }


    // --- Asset Drawing Functions ---
    function drawShipStriker(context, x, y, size) {
        context.fillStyle = '#66fcf1'; context.beginPath();
        context.moveTo(x, y - size/2); context.lineTo(x - size/2, y + size/2);
        context.lineTo(x, y + size/4); context.lineTo(x + size/2, y + size/2);
        context.closePath();
        context.shadowBlur = 15; context.shadowColor = '#66fcf1'; context.fill(); context.shadowBlur = 0;
    }
    function drawShipPhantom(context, x, y, size) {
        context.fillStyle = '#ffeb3b'; context.beginPath();
        context.moveTo(x - size/2, y + size/2); context.lineTo(x - size/4, y - size/2);
        context.lineTo(x, y - size/4); context.lineTo(x + size/4, y - size/2);
        context.lineTo(x + size/2, y + size/2); context.lineTo(x + size/4, y + size/3);
        context.lineTo(x - size/4, y + size/3); context.closePath();
        context.shadowBlur = 15; context.shadowColor = '#ffeb3b'; context.fill(); context.shadowBlur = 0;
    }
    function drawShipTitan(context, x, y, size) {
        context.fillStyle = '#39ff14'; context.beginPath();
        context.moveTo(x - size/2, y - size/4); context.lineTo(x + size/2, y - size/4);
        context.lineTo(x + size/3, y + size/2); context.lineTo(x - size/3, y + size/2);
        context.closePath();
        context.shadowBlur = 15; context.shadowColor = '#39ff14'; context.fill(); context.shadowBlur = 0;
        context.fillStyle = '#222'; context.fillRect(x - size/6, y - size/6, size/3, size/3);
    }
    function renderPreviews() {
        drawShipStriker(document.getElementById('ship1Preview').getContext('2d'), 40, 40, 50);
        drawShipPhantom(document.getElementById('ship2Preview').getContext('2d'), 40, 40, 50);
        drawShipTitan(document.getElementById('ship3Preview').getContext('2d'), 40, 40, 50);
    }
    renderPreviews();

    document.querySelectorAll('.ship-card').forEach(card => {
        card.addEventListener('click', () => {
            document.querySelectorAll('.ship-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedShipType = parseInt(card.getAttribute('data-ship'));
        });
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
        location.reload(); // Simple reload for multiplayer reset
    });

    // --- Game Classes ---
    class Player {
        constructor(type, id) {
            this.id = id;
            this.type = type;
            this.x = (id === 'p1') ? canvas.width / 2 - 50 : canvas.width / 2 + 50;
            this.y = canvas.height - 80;
            this.width = 40; this.height = 40;
            this.hitboxRadius = 4;
            this.weaponLevel = 1;
            this.shootCooldown = 0;

            if (type === 1) { this.speed = 6; this.maxHp = 100; this.shootDelay = 8; this.color = '#66fcf1'; } 
            else if (type === 2) { this.speed = 8.5; this.maxHp = 60; this.shootDelay = 5; this.color = '#ffeb3b'; } 
            else if (type === 3) { this.speed = 4; this.maxHp = 180; this.shootDelay = 10; this.color = '#39ff14'; }
            this.hp = this.maxHp;
        }

        updateLocally() {
            if (this.hp <= 0) return;
            if (keys['arrowleft'] || keys['a']) this.x -= this.speed;
            if (keys['arrowright'] || keys['d']) this.x += this.speed;
            if (keys['arrowup'] || keys['w']) this.y -= this.speed;
            if (keys['arrowdown'] || keys['s']) this.y += this.speed;

            this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
            this.y = Math.max(this.height/2, Math.min(canvas.height - this.height/2, this.y));

            if (this.shootCooldown > 0) this.shootCooldown--;
            // Let the local shoot be sent across correctly. 
            // In Client mode, host doesn't process client keys, host relies on sync.
        }

        shoot() {
            if (this.hp <= 0) return;
            const speed = -15; const c = this.color;
            if (this.weaponLevel === 1) {
                allBullets.push(new Bullet(this.x, this.y - 20, 0, speed, c, false, this.id));
            } else if (this.weaponLevel === 2) {
                allBullets.push(new Bullet(this.x - 10, this.y - 15, -2, speed, c, false, this.id));
                allBullets.push(new Bullet(this.x + 10, this.y - 15, 2, speed, c, false, this.id));
            } else {
                allBullets.push(new Bullet(this.x, this.y - 20, 0, speed, c, false, this.id));
                allBullets.push(new Bullet(this.x - 15, this.y - 10, -2.5, speed, c, false, this.id));
                allBullets.push(new Bullet(this.x + 15, this.y - 10, 2.5, speed, c, false, this.id));
                if (this.type === 2) {
                    allBullets.push(new Bullet(this.x - 25, this.y - 5, -5, speed, c, false, this.id));
                    allBullets.push(new Bullet(this.x + 25, this.y - 5, 5, speed, c, false, this.id));
                }
            }
        }

        takeDamage(amount) {
            this.hp -= amount;
            if (this.hp <= 0) {
                this.hp = 0;
                createExplosion(this.x, this.y, this.color, 50);
                pushEvent('explosion', { x: this.x, y: this.y, c: this.color, amount: 50 });
            }
            updateUI();
        }

        heal(amount) { this.hp = Math.min(this.maxHp, this.hp + amount); updateUI(); }
        upgradeWeapon() {
            if (this.weaponLevel < 3) this.weaponLevel++;
            else score += 500;
            updateUI();
        }

        draw() {
            if (this.hp <= 0) return;
            ctx.globalAlpha = (this.id === myPlayerId) ? 1.0 : 0.7; // Ally slightly transparent
            if (this.type === 1) drawShipStriker(ctx, this.x, this.y, this.width);
            else if (this.type === 2) drawShipPhantom(ctx, this.x, this.y, this.width);
            else drawShipTitan(ctx, this.x, this.y, this.width);
            ctx.globalAlpha = 1.0;

            // Hitbox
            ctx.fillStyle = '#ff003c'; ctx.beginPath();
            ctx.arc(this.x, this.y, this.hitboxRadius, 0, Math.PI * 2); ctx.fill();

            // Name Tag
            ctx.fillStyle = 'white'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
            ctx.fillText(this.id === myPlayerId ? 'YOU' : 'P2', this.x, this.y + 30);
        }
    }

    class Bullet {
        constructor(x, y, vx, vy, color, isEnemy, owner='') {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color;
            this.isEnemy = isEnemy; this.radius = isEnemy ? 5 : 4;
            this.owner = owner;
        }
        update() { this.x += this.vx; this.y += this.vy; }
        draw() {
            ctx.fillStyle = this.color; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 8; ctx.shadowColor = this.color; ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff'; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Enemy {
        constructor(x, y, type, id=0) {
            this.x = x; this.y = y; this.type = type;
            this.timer = 0;
            this.id = id || ++enemyIdCounter;
            
            if (type === 1) { this.hp = 15; this.color = '#ff3333'; this.speedY = 2.5; this.radius = 15; } 
            else if (type === 2) { this.hp = 40; this.color = '#b026ff'; this.speedY = 0.8; this.radius = 25; } 
            else if (type === 3) { this.hp = 60; this.color = '#ff00c8'; this.speedY = 0.5; this.radius = 30; } 
            else if (type === 4) { this.hp = 100; this.color = '#ff9900'; this.speedY = 0.3; this.radius = 40; }
            this.maxHp = this.hp;
        }

        update() {
            this.y += this.speedY;
            this.timer++;

            // Only host spawns enemy bullets
            if (!isHost) return;

            // Target the closest alive player
            let target = null;
            let minDist = Infinity;
            Object.values(players).forEach(p => {
                if (p.hp > 0) {
                    let d = Math.hypot(p.x - this.x, p.y - this.y);
                    if (d < minDist) { minDist = d; target = p; }
                }
            });
            if (!target) target = { x: canvas.width/2, y: canvas.height }; // fallback

            if (this.type === 1 && this.timer % 70 === 0) this.shootTarget(target, 4);
            else if (this.type === 2 && this.timer % 100 === 0) this.shootRadial(8, 3);
            else if (this.type === 3 && this.timer % 10 === 0) this.shootSpiral();
            else if (this.type === 4 && this.timer % 120 === 0) this.shootArc(10);
        }

        shootTarget(target, speed) {
            const angle = Math.atan2(target.y - this.y, target.x - this.x);
            enemyBullets.push(new Bullet(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, '#ff003c', true));
        }
        shootRadial(amount, speed) {
            for (let i = 0; i < amount; i++) {
                const angle = (Math.PI * 2 / amount) * i;
                enemyBullets.push(new Bullet(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, this.color, true));
            }
        }
        shootSpiral() {
            const speed = 3; const angle = this.timer * 0.15;
            enemyBullets.push(new Bullet(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, this.color, true));
            enemyBullets.push(new Bullet(this.x, this.y, Math.cos(angle+Math.PI)*speed, Math.sin(angle+Math.PI)*speed, this.color, true));
        }
        shootArc(amount) {
            const speed = 2.5; const startAngle = Math.PI * 0.2; const endAngle = Math.PI * 0.8;
            for (let i = 0; i < amount; i++) {
                const angle = startAngle + (endAngle - startAngle) * (i / (amount - 1));
                enemyBullets.push(new Bullet(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, '#ff9900', true));
            }
        }

        draw() {
            ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.beginPath();
            if (this.type === 1) {
                ctx.moveTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y - this.radius);
            } else if (this.type === 2) {
                ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y); ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
            } else if (this.type === 3) {
                const spikes = 5;
                for(let i=0; i<spikes*2; i++) {
                    const r = (i%2==0) ? this.radius : this.radius/2;
                    const a = (i * Math.PI / spikes) + (this.timer * 0.05);
                    if(i==0) ctx.moveTo(this.x + r*Math.cos(a), this.y + r*Math.sin(a));
                    else ctx.lineTo(this.x + r*Math.cos(a), this.y + r*Math.sin(a));
                }
            } else if (this.type === 4) {
                ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI*2);
                ctx.rect(this.x - this.radius, this.y - this.radius*0.3, this.radius*2, this.radius*0.6);
            }
            ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;

            const hpRatio = this.hp / this.maxHp;
            ctx.fillStyle = 'red'; ctx.fillRect(this.x - this.radius, this.y - this.radius - 10, this.radius*2, 4);
            ctx.fillStyle = '#0f0'; ctx.fillRect(this.x - this.radius, this.y - this.radius - 10, (this.radius*2) * hpRatio, 4);
        }
    }

    class Item {
        constructor(x, y, type, id=0) {
            this.id = id || ++itemIdCounter;
            this.x = x; this.y = y; this.type = type;
            this.radius = 12; this.vy = 1.5;
            this.color = type === 'heal' ? '#39ff14' : '#ffea00';
            this.pulse = 0;
        }
        update() { this.y += this.vy; this.pulse += 0.1; }
        draw() {
            const dr = this.radius + Math.sin(this.pulse) * 3;
            ctx.fillStyle = this.color; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - dr); ctx.lineTo(this.x + dr, this.y);
            ctx.lineTo(this.x, this.y + dr); ctx.lineTo(this.x - dr, this.y);
            ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = '#000'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(this.type === 'heal' ? 'H' : 'U', this.x, this.y);
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 5 + 2;
            this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.life = 1.0; this.decay = Math.random() * 0.03 + 0.02;
            this.radius = Math.random() * 3 + 1;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color; ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    class Star {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.radius = Math.random() * 1.5; this.vy = this.radius * 2;
            this.alpha = Math.random() * 0.8 + 0.2;
        }
        update() {
            this.y += this.vy;
            if (this.y > canvas.height) { this.y = 0; this.x = Math.random() * canvas.width; }
        }
        draw() {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        }
    }

    function createExplosion(x, y, color, amount) {
        for (let i = 0; i < amount; i++) particles.push(new Particle(x, y, color));
    }

    function circleCollision(x1, y1, r1, x2, y2, r2) {
        return Math.sqrt((x1-x2)**2 + (y1-y2)**2) < r1 + r2;
    }

    function spawnEnemies() {
        if (!isHost) return;
        const sr = Math.max(25, 80 - Math.floor(score / 300)); 
        if (frameCount % sr === 0) {
            const x = Math.random() * (canvas.width - 60) + 30;
            let type = 1; const rand = Math.random();
            if (score > 500 && rand > 0.4) type = 2;
            if (score > 1000 && rand > 0.7) type = 3;
            if (score > 1500 && rand > 0.85) type = 4;
            enemies.push(new Enemy(x, -30, type));
        }
    }

    function updateUI() {
        document.getElementById('scoreValue').innerText = score;
        
        let p1 = players['p1'];
        if(p1) {
            const perc1 = (p1.hp / p1.maxHp) * 100;
            const hp1 = document.getElementById('hpBar1');
            hp1.style.width = `${perc1}%`;
            hp1.style.backgroundColor = perc1 < 30 ? '#ff003c' : '#45a29e';
            document.getElementById('weaponLvValue1').innerText = p1.weaponLevel === 3 ? 'MAX' : p1.weaponLevel;
        }

        let p2 = players['p2'];
        if(p2 && isMultiplayer) {
            document.getElementById('p2UiBox').style.display = 'flex';
            const perc2 = (p2.hp / p2.maxHp) * 100;
            const hp2 = document.getElementById('hpBar2');
            hp2.style.width = `${perc2}%`;
            hp2.style.backgroundColor = perc2 < 30 ? '#ff003c' : '#45a29e';
            document.getElementById('weaponLvValue2').innerText = p2.weaponLevel === 3 ? 'MAX' : p2.weaponLevel;
        }
    }

    function showGameOver() {
        gameActive = false;
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    let networkEvents = [];
    function pushEvent(type, data) {
        if(!isHost) return;
        networkEvents.push({ type, ...data });
    }

    function startGameAsHost(clientShipType) {
        mainMenu.style.display = 'none';
        uiLayer.style.display = 'block';

        myPlayerId = 'p1';
        players['p1'] = new Player(selectedShipType, 'p1');
        
        if (isMultiplayer && clientShipType) {
            players['p2'] = new Player(clientShipType, 'p2');
            connection.send({ type: 'start', hostShipType: selectedShipType, clientShipType: clientShipType });
        }

        allBullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
        stars = Array.from({length: 100}, () => new Star());
        
        score = 0; frameCount = 0; gameActive = true;
        document.getElementById('gameOverScreen').style.display = 'none';
        
        updateUI();
        gameLoop();
    }

    function startGameAsClient(myShipType, hostShipType) {
        mainMenu.style.display = 'none';
        uiLayer.style.display = 'block';

        myPlayerId = 'p2';
        players['p1'] = new Player(hostShipType, 'p1');
        players['p2'] = new Player(myShipType, 'p2');
        
        allBullets = []; enemyBullets = []; enemies = []; items = []; particles = [];
        stars = Array.from({length: 100}, () => new Star());
        
        score = 0; frameCount = 0; gameActive = true;
        document.getElementById('gameOverScreen').style.display = 'none';
        
        updateUI();
        gameLoop();
    }

    function gameLoop() {
        if (!gameActive) return;
        frameCount++;
        
        // 1. Local Player Update & Shooting
        let me = players[myPlayerId];
        if (me && me.hp > 0) {
            me.updateLocally();
            if (keys[' '] && me.shootCooldown <= 0) {
                me.shoot();
                me.shootCooldown = me.shootDelay;
                keys[' '] = false; // Add a bit of lock
            }
        }

        stars.forEach(s => s.update());

        // 2. Network Sync
        if (isMultiplayer && frameCount % 2 === 0 && connection && connection.open) { // 30 FPS sync
            if (isHost) {
                // Host sends world state
                let state = {
                    type: 'sync',
                    score: score,
                    p1: players['p1'] ? {x:players['p1'].x, y:players['p1'].y, hp:players['p1'].hp, maxHp:players['p1'].maxHp, wl:players['p1'].weaponLevel} : null,
                    p2: players['p2'] ? {hp:players['p2'].hp, maxHp:players['p2'].maxHp, wl:players['p2'].weaponLevel} : null, // Host doesn't override client POS heavily, or does it? Host sends HP
                    enemies: enemies.map(e => ({ x:Math.floor(e.x), y:Math.floor(e.y), t:e.type, hp:e.hp, mhp:e.maxHp, id:e.id })),
                    items: items.map(i => ({ x:Math.floor(i.x), y:Math.floor(i.y), t:i.type, id:i.id })),
                    eBullets: enemyBullets.map(b => ({ x:Math.floor(b.x), y:Math.floor(b.y), vx:b.vx, vy:b.vy, c:b.color })),
                    hostBullets: allBullets.filter(b=>b.owner==='p1').map(b => ({ x:Math.floor(b.x), y:Math.floor(b.y), vx:b.vx, vy:b.vy, c:b.color })),
                    events: networkEvents
                };
                connection.send(state);
                networkEvents = []; // clear after send
            } else {
                // Client sends its pos and bullets
                let state = {
                    type: 'sync',
                    px: me.x,
                    py: me.y,
                    shoot: keys[' ']
                };
                connection.send(state);
                // Also, client bullets are managed locally, maybe host checks collisions based on client bullets? 
                // For a robust system, client should send bullets to host.
                // In this simplified version, host trusts client HP, but actually let's just let client send inputs/pos, host does everything else.
            }
        }

        // 3. Game Logic (Host only for interactions, Client for visual extrapolation)
        if (isHost) spawnEnemies();

        // Update Bullets
        for (let i = allBullets.length - 1; i >= 0; i--) {
            let b = allBullets[i]; b.update();
            if (b.y < -10 || b.y > canvas.height + 10 || b.x < -10 || b.x > canvas.width + 10) allBullets.splice(i, 1);
        }
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            let b = enemyBullets[i]; b.update();
            if (b.y < -10 || b.y > canvas.height + 10 || b.x < -10 || b.x > canvas.width + 10) enemyBullets.splice(i, 1);
        }

        if (isHost) {
            // Update Enemies & Items
            for (let i = enemies.length - 1; i >= 0; i--) { let e = enemies[i]; e.update(); if (e.y > canvas.height+50) enemies.splice(i, 1); }
            for (let i = items.length - 1; i >= 0; i--) { let it = items[i]; it.update(); if (it.y > canvas.height+20) items.splice(i, 1); }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i]; p.update();
            if (p.life <= 0) particles.splice(i, 1);
        }

        // --- Host Collisions --- 
        if (isHost) {
            // Player vs Items
            for (let pid in players) {
                let p = players[pid];
                if(p.hp <= 0) continue;
                for (let i = items.length - 1; i >= 0; i--) {
                    let it = items[i];
                    if (circleCollision(p.x, p.y, p.width/2, it.x, it.y, it.radius)) {
                        if (it.type === 'heal') p.heal(30); else p.upgradeWeapon();
                        createExplosion(it.x, it.y, it.color, 10);
                        pushEvent('explosion', { x: it.x, y: it.y, c: it.color, amount: 10 });
                        items.splice(i, 1);
                    }
                }
            }

            // Player vs Enemy Bullets
            for (let pid in players) {
                let p = players[pid];
                if(p.hp <= 0) continue;
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    let b = enemyBullets[i];
                    if (circleCollision(p.x, p.y, p.hitboxRadius, b.x, b.y, b.radius)) {
                        p.takeDamage(10);
                        createExplosion(b.x, b.y, '#ff003c', 5);
                        pushEvent('explosion', { x: b.x, y: b.y, c: '#ff003c', amount: 5 });
                        enemyBullets.splice(i, 1);
                    }
                }
            }

            // Player vs Enemies
            for (let pid in players) {
                let p = players[pid];
                if(p.hp <= 0) continue;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let e = enemies[i];
                    if (circleCollision(p.x, p.y, p.hitboxRadius + 10, e.x, e.y, e.radius)) {
                        p.takeDamage(20); e.hp = 0;
                        createExplosion(e.x, e.y, e.color, 20);
                        pushEvent('explosion', { x: e.x, y: e.y, c: e.color, amount: 20 });
                        enemies.splice(i, 1);
                    }
                }
            }

            // All Player Bullets vs Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                for (let j = allBullets.length - 1; j >= 0; j--) {
                    let b = allBullets[j];
                    if (circleCollision(e.x, e.y, e.radius, b.x, b.y, b.radius)) {
                        // Figure out damage based on owner
                        let ownerP = players[b.owner];
                        let dmg = 15;
                        if(ownerP) dmg = (ownerP.type === 2 ? 8 : (ownerP.type === 3 ? 20 : 15));
                        
                        e.hp -= dmg;
                        allBullets.splice(j, 1);
                        createExplosion(b.x, b.y, e.color, 3);
                        pushEvent('explosion', { x: b.x, y: b.y, c: e.color, amount: 3 });

                        if (e.hp <= 0) {
                            score += e.type * 50; updateUI();
                            createExplosion(e.x, e.y, e.color, 20);
                            pushEvent('explosion', { x: e.x, y: e.y, c: e.color, amount: 20 });
                            if (Math.random() < 0.20) items.push(new Item(e.x, e.y, Math.random() < 0.4 ? 'heal' : 'upgrade'));
                            enemies.splice(i, 1); break;
                        }
                    }
                }
            }

            // Check Game Over condition for Host
            let allDead = true;
            for(let pid in players) {
                if(players[pid].hp > 0) allDead = false;
            }
            if(allDead && gameActive) {
                showGameOver();
                pushEvent('gameover', {});
            }
        } else {
            // Client checks its own bullet collisions visually (enemies die only on host sync, but client can generate hit explosion particles immediately)
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                for (let j = allBullets.length - 1; j >= 0; j--) {
                    let b = allBullets[j];
                    if (b.owner === myPlayerId && circleCollision(e.x, e.y, e.radius, b.x, b.y, b.radius)) {
                        createExplosion(b.x, b.y, e.color, 3);
                        allBullets.splice(j, 1);
                    }
                }
            }
        }

        // Render
        ctx.fillStyle = '#0b0c10'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => s.draw());
        items.forEach(i => i.draw());
        enemies.forEach(e => e.draw());
        enemyBullets.forEach(b => b.draw());
        allBullets.forEach(b => b.draw());
        particles.forEach(p => p.draw());
        
        for (let pid in players) players[pid].draw();

        if (gameActive) animationId = requestAnimationFrame(gameLoop);
    }
</script>
